
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
        </div>
        <h1>Lotto Gen</h1>
        <p class="description">Generate your lucky numbers with a click!</p>
        <div class="numbers-container">
            <div class="number">-</div>
            <div class="number">-</div>
            <div class="number">-</div>
            <div class="number">-</div>
            <div class="number">-</div>
            <div class="number">-</div>
        </div>
        <button id="generate-btn">Generate Lucky Numbers</button>

        <div class="partnership-section">
            <hr class="divider">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/xpqyvonp" method="POST" id="inquiry-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your email address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
